name: Windows RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest

    steps:
      - name: Enable RDP and set password
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          net user administrator /active:yes
          net user administrator "Island123!"

      - name: Download and run Ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath . -Force
          .\ngrok.exe config add-authtoken $env:NGROK_AUTH_TOKEN
          Start-Process .\ngrok.exe -ArgumentList "tcp 3389" -NoNewWindow -PassThru

      - name: Show Connection Info
        run: |
          echo "=============================="
          echo "Username: administrator"
          echo "Password: Island123!"
          echo "Wait 1-2 minutes and check Actions logs for Ngrok address"
          echo "=============================="
